<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ibo's Time Leak Tracker</title>

  <!-- Bootstrap CSS & my CSS files -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/My-own-CSS.css">  
  <!-- Fonts I used from google fonts to stylize the lead -->
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">

</head>
<body class="bg-light">

  <div class="container py-5">

    <!-- Title -->
    <div class="text-center mb-5">
      <h1 class="bitcount">Ibo's Time Leak Tracker</h1>
      <p class="text-muted">Keep track of what you're actually doing</p>
      <button class="btn btn-dark mb-3" onclick="toggleDarkMode()">
       Toggle Dark Mode
      </button>
    </div>

    <!-- Timer Card -->
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow-sm text-center p-4">

          <h2 id="liveTimer" class="display-5">0s</h2>
          <p id="status" class="text-muted">Not running</p>

          <button id="timerBtn" class="btn btn-primary btn-lg mt-3" onclick="toggleTimer()">
            Start
          </button>

        </div>

      </div>
    </div>

    <!-- Entries -->
    <div class="row justify-content-center mt-5">
      <div class="col-md-6">

        <h4 class="mb-3">Your Sessions</h4>
        <div id="entriesList"></div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/My-own-js-code.js"></script>

</body>
</html>
